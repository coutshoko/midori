name: deploy

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.0
        env:
          POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
        with:
          host: ${{ secrets.PI_SSH_HOST }}
          username: ${{ secrets.PI_SSH_USER }}
          key: ${{ secrets.PI_SSH_KEY }}
          envs: POSTGRES_PASSWORD,JWT_SECRET
          script: |
            cd ./midori
            git pull origin main

            # Write runtime secrets to .env (never committed to git)
            cat > .env <<EOF
            POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
            JWT_SECRET=${JWT_SECRET}
            EOF
            chmod 600 .env

            mkdir -p ./app
            cd ./app

            # haruki-murakami-random-quotes
            if [ -d "haruki-murakami-random-quotes" ]; then
              cd haruki-murakami-random-quotes && git pull origin main && cd ..
            else
              git clone https://github.com/coutshoko/haruki-murakami-random-quotes.git
            fi

            # tarkov-flea-market-stock-exchange
            if [ -d "tarkov-flea-market-stock-exchange" ]; then
              cd tarkov-flea-market-stock-exchange && git pull origin main && cd ..
            else
              git clone https://github.com/coutshoko/tarkov-flea-market-stock-exchange.git
            fi

            # dota2currank
            if [ -d "dota2currank" ]; then
              cd dota2currank && git pull origin main && cd ..
            else
              git clone https://github.com/coutshoko/dota2currank.git
            fi

            cd ../..

            # chatboard (cloned as sibling of midori, not inside ./app)
            if [ -d "chatboard" ]; then
              cd chatboard && git pull origin main && cd ..
            else
              git clone https://github.com/coutshoko/chatboard.git
            fi

            # portfolio (cloned as sibling of midori, not inside ./app)
            if [ -d "portfolio" ]; then
              cd portfolio && git pull origin main && cd ..
            else
              git clone https://github.com/coutshoko/portfolio.git
            fi

            cd midori
            docker compose up -d --build
