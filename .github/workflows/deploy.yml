name: deploy

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.VPS_SSH_HOST }}
          username: root
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            cd ./midori
            git pull origin main

            mkdir -p ./app
            cd ./app

            # haruki-murakami-random-quotes
            if [ -d "haruki-murakami-random-quotes" ]; then
              cd haruki-murakami-random-quotes && git pull origin main && cd ..
            else
              git clone https://github.com/coutshoko/haruki-murakami-random-quotes.git
            fi

            # tarkov-flea-market-stock-exchange
            if [ -d "tarkov-flea-market-stock-exchange" ]; then
              cd tarkov-flea-market-stock-exchange && git pull origin main && cd ..
            else
              git clone https://github.com/coutshoko/tarkov-flea-market-stock-exchange.git
            fi

            # dota2currank
            if [ -d "dota2currank" ]; then
              cd dota2currank && git pull origin main && cd ..
            else
              git clone https://github.com/coutshoko/dota2currank.git
            fi

            cd ../..

            # chatboard (cloned at same level as midori, not in ./app)
            if [ -d "chatboard" ]; then
              cd chatboard && git pull origin main && cd ..
            else
              git clone https://github.com/coutshoko/chatboard.git
            fi

            cd midori
            docker compose up -d --build